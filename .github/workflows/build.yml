name: Build Frontend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd app/fe_redzone
          npm install

      - name: Build
        run: |
          cd app/fe_redzone
          npm run build

      - name: Copy build to fe_redzone folder
        run: |
          rm -rf fe_redzone
          mkdir fe_redzone
          cp -r app/fe_redzone/dist/* fe_redzone/
      - name: Commit build
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add fe_redzone
          git commit -m "Auto build frontend" || echo "No changes"
          git push